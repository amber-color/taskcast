<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - TaskTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskTracker">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overscroll-behavior: none;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 360px;
        }
        h1 {
            text-align: center;
            font-size: 20px;
            margin: 0 0 24px;
            color: #333;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        .tab.active {
            color: #333;
            border-bottom-color: #333;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #555; }
        .hint {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 11px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: #555; }
        #errorMsg {
            color: #c00;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
            margin-bottom: 8px;
        }
        .panel { display: none; }
        .panel.active { display: block; }

        html.dark { color-scheme: dark; }
        html.dark body { background: #111213; }
        html.dark .card { background: #1c1c1e; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
        html.dark h1 { color: #e0e0e0; }
        html.dark .tab { color: #555; }
        html.dark .tab.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }
        html.dark .tabs { border-bottom-color: #2e2e2e; }
        html.dark label { color: #aaa; }
        html.dark input[type="text"], html.dark input[type="password"] { background: #2c2c2e; border-color: #3a3a3a; color: #e0e0e0; }
        html.dark input:focus { border-color: #888; }
        html.dark .hint { color: #555; }
        html.dark button[type="submit"] { background: #aaa; color: #111; }
        html.dark button[type="submit"]:hover { background: #ccc; }
        html.dark #errorMsg { color: #ff6b6b; }
    </style>
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
</head>
<body>
<div class="card">
    <h1>📋 TaskTracker</h1>
    <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">ログイン</div>
        <div class="tab" id="tabRegister" onclick="switchTab('register')">新規登録</div>
    </div>

    <div id="errorMsg"></div>

    <div class="panel active" id="panelLogin">
        <form id="loginForm">
            <div class="form-group">
                <label>ID</label>
                <input type="text" id="loginUsername" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" id="loginPassword" autocomplete="current-password" required>
            </div>
            <button type="submit">ログイン</button>
        </form>
    </div>

    <div class="panel" id="panelRegister">
        <form id="registerForm">
            <div class="form-group">
                <label>ID</label>
                <input type="text" id="regUsername" autocomplete="username" required>
                <div class="hint">半角英数字 1〜32文字</div>
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" id="regPassword" autocomplete="new-password" required>
                <div class="hint">8文字以上</div>
            </div>
            <div class="form-group">
                <label>パスワード（確認）</label>
                <input type="password" id="regPasswordConfirm" autocomplete="new-password" required>
            </div>
            <button type="submit">アカウント作成</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // 保存済み認証情報で自動ログイン
        const saved = JSON.parse(localStorage.getItem('credentials') ?? 'null');
        if (saved?.username && saved?.password) {
            try {
                const r = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', username: saved.username, password: saved.password })
                });
                const d = await r.json();
                if (d.ok) { location.href = 'index.html'; return; }
            } catch (_) {}
            localStorage.removeItem('credentials');
        }

        // セッション継続チェック
        const res = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'check' })
        });
        const data = await res.json();
        if (data.ok) {
            location.href = 'index.html';
        }
    });

    function switchTab(tab) {
        document.getElementById('errorMsg').textContent = '';
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
        document.getElementById('panelRegister').classList.toggle('active', tab === 'register');
    }

    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
    }

    async function authFetch(body) {
        const res = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok && res.headers.get('Content-Type')?.includes('text/html')) {
            throw new Error(`サーバーエラー (${res.status})`);
        }
        return res.json();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('');
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            const data = await authFetch({ action: 'login', username, password });
            if (data.ok) {
                localStorage.setItem('credentials', JSON.stringify({ username, password }));
                location.href = 'index.html';
            } else {
                showError(data.error || 'ログインに失敗しました');
            }
        } catch (err) {
            showError(err.message || 'ネットワークエラーが発生しました');
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('');
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;
        if (password !== confirm) {
            showError('パスワードが一致しません');
            return;
        }
        try {
            const data = await authFetch({ action: 'register', username, password });
            if (data.ok) {
                location.href = 'index.html';
            } else {
                showError(data.error || '登録に失敗しました');
            }
        } catch (err) {
            showError(err.message || 'ネットワークエラーが発生しました');
        }
    });
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
