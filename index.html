<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Today'sTaskTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskTracker">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link href="vendor/fullcalendar.min.css" rel="stylesheet">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            overflow: hidden;
            background: white;
            overscroll-behavior: none;
        }

        /* 全体レイアウト */
        #main {
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        #todayArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 上部バー */
        #mobileBar {
            display: flex;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 8px 20px;
        }

        #topBarInner {
            width: 100%;
            display: flex;
            align-items: center;
        }

        #navGroup {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            min-width: 0;
        }

        #controlsGroup {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ‹ › ナビゲーション */
        #prevBtn, #nextBtn {
            background: transparent;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 15px;
            color: #444;
            cursor: pointer;
            transition: background 0.13s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #prevBtn:hover, #nextBtn:hover { background: rgba(0,0,0,0.06); }

        /* 日付タイトル */
        #calendarTitle {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            user-select: none;
        }

        /* セグメントコントロール（日・週・月） */
        #viewSwitcher {
            display: flex;
            background: transparent;
            border-radius: 9px;
            padding: 3px;
            gap: 2px;
        }

        .view-btn {
            background: transparent;
            border: none;
            border-radius: 7px;
            padding: 0 11px;
            height: 26px;
            font-size: 13px;
            font-weight: 500;
            color: #777;
            cursor: pointer;
            transition: all 0.12s ease;
            white-space: nowrap;
        }
        .view-btn:hover:not(.active) { color: #333; }
        .view-btn.active {
            background: #fff;
            color: #222;
            box-shadow: 0 1px 4px rgba(0,0,0,0.14), 0 0 0 0.5px rgba(0,0,0,0.06);
        }

        /* 平日トグルボタン */
        #weekdayBtn {
            background: transparent;
            border: none;
            border-radius: 8px;
            padding: 0 12px;
            height: 32px;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.13s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #weekdayBtn:hover { background: rgba(0,0,0,0.06); }
        #weekdayBtn.active {
            background: #fff;
            color: #222;
            box-shadow: 0 1px 4px rgba(0,0,0,0.14), 0 0 0 0.5px rgba(0,0,0,0.06);
        }

        /* 右側エリア */
        #timebar {
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        #timebar input[type="time"] {
            border: none;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            padding: 0;
            height: auto;
            appearance: textfield;
            cursor: pointer;
        }

        /* ダッシュボード・設定ボタン */
        #dashboardBtn, #settingsBtn {
            background: transparent;
            border: none;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            font-size: 15px;
            color: #444;
            cursor: pointer;
            transition: background 0.13s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #dashboardBtn:hover, #settingsBtn:hover { background: rgba(0,0,0,0.06); }

        /* コンテンツエリア */
        #container {
            flex: 1;
            display: flex;
            overflow: hidden;
            width: 100%;
            align-self: stretch;
        }

        #tasklist {
            flex: 0 0 25%;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eee;
            height: 100%;
            background: white;
            position: relative;
            overflow: hidden;
        }

        #ptr-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #999;
            font-size: 12px;
            pointer-events: none;
            z-index: 0;
        }
        #ptr-indicator .ptr-arrow {
            font-size: 16px;
            display: inline-block;
            transition: transform 0.2s, opacity 0.15s;
        }

        #tasks-container {
            flex: 1;
            overflow-y: auto;
            padding: 5px 10px 10px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        @media screen and (max-width: 800px) {
            #mobileBar { padding: 6px 12px; }
            .omit-text { display: none; }
            #viewSwitcher { display: none; }
            #weekdayBtn { display: none; }
            #navGroup { gap: 4px; }
            #controlsGroup { gap: 6px; }
            #container { overflow: hidden; }
            #tasklist {
                flex: none;
                min-width: 0 !important;
                border-right: none;
                box-shadow: inset -1px 0 0 #eee;
                overflow: hidden;
            }
            #calendar {
                flex: none;
                min-width: 0;
                overflow: hidden;
            }
            #tasks-container { padding: 5px 10px 10px; }
            html.dark #tasklist { box-shadow: inset -1px 0 0 #2e2e2e; }
        }

        #tasks {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task {
            padding: 8px 8px 3px;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        .task strong {
            font-weight: 600;
            font-size: 0.92em;
        }

        .task-meta {
            font-size: 0.78em;
            color: #666;
        }

        .done {
            opacity: 0.5;
            /*text-decoration: line-through;*/
        }

        #task-toolbar {
            display: none;
        }

        .done-folder-header {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            background: #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #6b7280;
            user-select: none;
            margin-bottom: 6px;
        }
        .done-folder-header:hover { background: #d1d5db; }
        .done-folder-header .folder-arrow {
            display: inline-block;
            transition: transform 0.25s ease;
        }
        .done-folder-header.open .folder-arrow { transform: rotate(90deg); }
        .done-folder-body-wrap {
            overflow: hidden;
            height: 0;
        }
        .done-folder-body {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-bottom: 6px;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.65; }
        }
        .working {
            border: 2px solid red;
            animation: breathe 1.8s ease-in-out infinite;
        }

        .task-completing {
            position: relative;
            overflow: hidden;
            pointer-events: none;
            transition: height 0.4s ease, opacity 0.35s ease, margin-bottom 0.4s ease, padding 0.4s ease;
        }
        .task-complete-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: rgba(255,255,255,0.9);
            animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes checkPop {
            0%   { transform: scale(0); opacity: 0; }
            70%  { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-spinner {
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        #quickAddBar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: #fff;
            border-radius: 999px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08);
            padding: 10px 22px;
            display: flex;
            align-items: center;
            width: min(560px, 88vw);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #quickAddBar.hidden {
            transform: translateX(-50%) translateY(calc(100% + 30px));
        }
        #quickAddInput {
            border: none;
            outline: none;
            font-size: 15px;
            width: 100%;
            background: transparent;
            color: #333;
        }
        #quickAddInput::placeholder { color: #bbb; }

        #quickAddEstimateWrap {
            display: none;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
            border-left: 1px solid #eee;
            padding-left: 10px;
            margin-left: 6px;
        }
        html.dark #quickAddEstimateWrap { border-left-color: #333; }
        #quickAddEstimateWrap.visible { display: flex; }
        #quickAddEstimate {
            width: 44px;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: #555;
            text-align: right;
            -moz-appearance: textfield;
        }
        #quickAddEstimate::-webkit-inner-spin-button,
        #quickAddEstimate::-webkit-outer-spin-button { -webkit-appearance: none; }
        html.dark #quickAddEstimate { color: #aaa; }
        #quickAddEstimateLabel { font-size: 12px; color: #bbb; }

        #quickAddSuggestions {
            position: fixed;
            bottom: calc(20px + 52px + 6px);
            left: 50%;
            transform: translateX(-50%);
            width: min(560px, 88vw);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.13);
            overflow: hidden;
            display: none;
            z-index: 199;
        }
        html.dark #quickAddSuggestions { background: #1e1e1e; }
        .qs-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            gap: 8px;
        }
        html.dark .qs-item { border-bottom-color: #2a2a2a; color: #e0e0e0; }
        .qs-item:last-child { border-bottom: none; }
        .qs-item:hover { background: #f7f7f7; }
        html.dark .qs-item:hover { background: #2a2a2a; }
        .qs-item.qs-top { font-weight: 600; }
        .qs-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .qs-actual { color: #888; font-size: 12px; white-space: nowrap; }

        #newtask {
            padding: 10px;
            border-top: 1px solid #ccc;
            background: #f5f5f7;
            padding: 10px 16px;
            max-width: 100%;
            margin: 0;
            font-size: 16px;
        }

        #newtask input,
        #newtask textarea {
            height: 30px;
            width: 100%;
        }

        #newtask button {
            height: 30px;
            width: 30px;
        }

        #newtask input {
            margin-bottom: 5px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0px;
        }

        #title {
            flex: 1;
            max-width: 80%;
        }

        #estimate {
            max-width: 20%;
        }

        #memo {
            flex: 1;
            max-width: 100%;
            resize: none;
        }

        #calendar {
            flex: 1;
            overflow-y: auto;
        }

        /* 週表示: ヘッダー・タイムライン共通の列区切り線（絶対配置divで描画） */
        .fc-week-lane-divider {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 100%;
            background: #eee;
            pointer-events: none;
            z-index: 2;
        }
        html.dark .fc-week-lane-divider { background: #333; }
        /* 週表示: 時間軸列の右ボーダーを非表示（1日目左はdividerで代替） */
        #calendar .fc-timeGridWeek-view .fc-timegrid-axis { border-right: none !important; }

        /* カレンダー全ボーダーをトップバー下線（1px #eee）に統一 */
        #calendar .fc-theme-standard td,
        #calendar .fc-theme-standard th {
            border-color: #eee !important;
        }
        #calendar .fc-scrollgrid {
            border-color: #eee !important;
        }
        /* 左端の外枠ボーダーを除去（scrollgrid自身のborderと列border重複回避） */
        #calendar .fc-scrollgrid-section-header > td:first-child,
        #calendar .fc-scrollgrid-section-body > td:first-child {
            border-left: none !important;
        }
        /* 半時間スロットの点線も #eee に統一 */
        #calendar .fc-timegrid-slot-minor {
            border-top-color: #eee !important;
        }

        .task-actions {
            display: flex;
            width: 100%;
            margin-top: 6px;
        }

        .task-actions button {
            flex: 1 1 25%;
            border: none;
            padding: 5px 0;
            color: rgba(0,0,0,0.45);
            background: none;
            cursor: pointer;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-actions svg {
            width: 14px;
            height: 14px;
        }

        .task-actions button:hover {
            color: rgba(0,0,0,0.75);
        }

        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 5px 0;
        }

        .color-swatch {
            width: 20px;
            height: 20px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-swatch.selected {
            border: 2px solid black;
        }

        #calendar .fc .fc-scrollgrid,
        #calendar .fc .fc-daygrid,
        #calendar .fc .fc-timegrid,
        #calendar .fc .fc-view-harness,
        #calendar .fc .fc-view {
            border: none !important;
            box-shadow: none !important;
        }


        #calendar .fc-scrollgrid-sync-inner,
        #calendar .fc-timegrid-axis {
            background-color: #fff !important;
        }



        #calendar .fc-timeGridDay-view .fc-col-header {
            display: none !important;
        }

        #calendar .fc-header-toolbar {
            display: none !important;
        }

        .fc-timegrid-slot {
            height: var(--slot-height, 90px) !important;
        }
        /* カラム側で背景を管理（スロットはz-indexが高いため背景を持たせない） */
        #calendar .fc-timegrid-col { background: white !important; }
        /* 週表示・月表示の今日ハイライト（日表示は除外） */
        #calendar .fc-timeGridWeek-view .fc-timegrid-col.fc-day-today { background: rgba(255,220,40,0.12) !important; }
        #calendar .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame { background: rgba(255,220,40,0.12) !important; }
        /* 週・月表示: 選択日の強調ボーダー */
        #calendar .fc-day-selected { outline: 1px solid #888 !important; outline-offset: -1px; }
        html.dark #calendar .fc-day-selected { outline-color: #aaa !important; }

        .fc-timegrid-slot-label {
            background-color: white !important;
        }

        .fc-event {
            border: none !important;
        }
        .fc-timegrid-event-harness-inset .fc-timegrid-event,
        .fc-timegrid-event.fc-event-mirror {
            box-shadow: none !important;
        }

        .fc-event-time {
            font-size: larger !important;
            color: black !important;
        }

        .fc-event-title {
            color: black;
            font-weight: bold;
        }

        html.dark .fc-daygrid-event .fc-event-time { color: #fff !important; }
        html.dark .fc-daygrid-event .fc-event-title { color: #fff; }

        .drag-handle {
            cursor: grab;
            font-size: 18px;
            user-select: none;
            color: #999;
            position: absolute;
            top: 50%;
            right: 4px;
            transform: translateY(-50%);
        }

        #dashboardBtn {
            margin-left: 0;
            margin-right: 3px;
            padding: 8px 8px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }


        /* 土曜を青に */
        .fc .fc-day-sat {
            color: blue;
        }

        /* 日曜を赤に */
        .fc .fc-day-sun {
            color: red;
        }

        #calendarTitle {
            font-size: 20px;
        }

        /* メモ内の長いURLを強制改行して崩れを防ぐ */
        .task .memo {
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
            font-size: 0.8em;
            color: #555;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }
        .task .memo.expanded {
            display: block;
            overflow: visible;
        }
        .task .memo:empty {
            display: none;
        }

        /* クリックできるリンクの見た目（任意） */
        .task .memo a {
            color: #06c;
            text-decoration: underline;
        }

        /* 追加：タイトルリンクの見た目（任意） */
        .task .title-link {
            color: #06c;
            text-decoration: underline;
        }

        .task .title-link:visited {
            color: #551a8b;
        }

        /* ===== 編集モーダル ===== */
        #editModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #editModal.open {
            display: flex;
        }
        #editModalBox {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 420px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #editModalBox h3 {
            margin: 0 0 4px;
            font-size: 16px;
            color: #333;
        }
        #editModalBox input[type="text"],
        #editModalBox input[type="number"],
        #editModalBox input[type="url"],
        #editModalBox input[type="date"],
        #editModalBox input[type="time"],
        #editModalBox textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        #editModalBox textarea {
            resize: vertical;
            min-height: 72px;
        }
        .modal-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .modal-row label {
            font-size: 13px;
            color: #555;
            white-space: nowrap;
        }
        .modal-row input { flex: 1; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }
        .modal-footer button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        #modalCancelBtn { background: #e0e0e5; color: #333; }
        #modalSaveBtn   { background: #333; color: #fff; }
        #modalSaveBtn:hover { background: #555; }
        .fixed-toggle {
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .fixed-toggle.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        .section-divider {
            color: #9ca3af;
            font-size: 11px;
            padding: 6px 0 2px;
            border-top: 1px solid #e5e7eb;
            margin-top: 4px;
        }
        .task.waiting-mode {
            opacity: 0.75;
        }
        .resurface-badge {
            display: inline-block;
            font-size: 10px;
            background: #fbbf24;
            color: #fff;
            border-radius: 4px;
            padding: 1px 5px;
            margin-right: 4px;
            vertical-align: middle;
        }
        .task-wait-date {
            font-size: 11px;
            color: #777;
            margin-left: 4px;
        }

        /* ダークテーマ */
        html.dark { color-scheme: dark; }
        html.dark body { background: #111213; color: #e0e0e0; }
        html.dark #mobileBar { background: #1c1c1e; border-bottom-color: #2e2e2e; }
        html.dark #calendarTitle { color: #e0e0e0; }
        html.dark #prevBtn, html.dark #nextBtn { color: #aaa; }
        html.dark .view-btn { color: #666; }
        html.dark .view-btn.active { background: #2c2c2e; color: #e0e0e0; box-shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.06); }
        html.dark #weekdayBtn { color: #666; }
        html.dark #weekdayBtn.active { background: #2c2c2e; color: #e0e0e0; box-shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.06); }

<body>

            </div>
            <div id="quickAddSuggestions"></div>

    <!-- 編集モーダル -->

    <!-- 待ちモーダル -->
    <div id="waitModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;">
        <div style="border-radius:12px;padding:24px;width:320px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,0.2);display:flex;flex-direction:column;gap:10px;">
            <h3 style="margin:0 0 4px;font-size:16px;">待ち設定</h3>
            <textarea id="waitModalTitle" rows="2" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;font-family:inherit;resize:none;"></textarea>
            <div class="modal-row">
                <label>再浮上日</label><input type="date" id="waitModalDate">
            </div>
            <div class="modal-footer">
                <button id="waitModalCancelBtn" style="padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;">キャンセル</button>
                <button id="waitModalSaveBtn" style="padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;">待ち状態にする</button>
            </div>
        </div>
    </div>

    <script src="vendor/sortable.min.js"></script>
    <script src="vendor/fullcalendar.min.js"></script>
    <script>
        let allTasks = [];
        let waitingTargetId = null;
        let lastResurfacedCount = 0;
        let doneExpanded = false;
        let waitExpanded = false;
        const colorList = [
            "#EF9A9A", "#F48FB1", "#CE93D8", "#B39DDB",
            "#9FA8DA", "#90CAF9", "#80DEEA", "#80CBC4",
            "#A5D6A7", "#C5E1A5", "#FFF176", "#FFE082"
        ];
        let currentDate = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
        let calendar;
        let editingId = null;
        let pendingNewTask = null;
        const tasksEl = document.getElementById("tasks");
        let autoStartNext = false;
        let smartEstimate = false;
        let taskHistoryCache = null;
        let cachedDefaultEstimate = 15;
        let startTime = localStorage.getItem('startTime') || '09:00';

        const SLOT_HEIGHTS = [36, 60, 90, 120, 150];
        const endTimeDisplay = document.getElementById("endTimeDisplay");
        document.getElementById("startTimeDisplay").textContent = startTime;

        let showTimer;

        function getTasks(date) {
            return allTasks.filter(t => t.date === date);
        }

        async function apiCall(body, keepalive = false) {
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    keepalive
                });
                if (res.status === 401) { location.href = 'login.html'; return null; }
                return await res.json();
            } catch (e) {
                console.error('API error:', e);
                return null;
            }
        }

        function syncLocal() {
            localStorage.setItem("allTasks", JSON.stringify(allTasks));
        }

        async function loadTasks() {
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'load' })
                });
                if (res.status === 401) { location.href = 'login.html'; return; }
                if (!res.ok) throw new Error("読み込み失敗");
                const serverTasks = await res.json();

                if (serverTasks.length === 0) {
                    const localTasks = JSON.parse(localStorage.getItem("allTasks")) ?? [];
                    if (localTasks.length > 0) {
                        // DBが空でローカルにデータがある場合、DBへ移行する
                        for (const task of localTasks) {
                            await apiCall({ action: 'add', task });
                        }
                        const res2 = await fetch('/api', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'load' })
                        });
                        allTasks = await res2.json();
                        taskHistoryCache = null;
                        syncLocal();
                        return;
                    }
                }

                allTasks = serverTasks;
                taskHistoryCache = null;
                syncLocal();
            } catch (e) {
                console.error("タスク読み込みエラー:", e);
                allTasks = JSON.parse(localStorage.getItem("allTasks")) ?? [];
                taskHistoryCache = null;
            }
        }

        function formatDiff(task) {
            const diff = task.actual - task.estimate;
            if (diff === 0) return '±0分';
            return (diff > 0 ? '+' : '') + diff + '分';
        }

        function getDiffColor(task) {
            const diff = task.actual - task.estimate;
            if (diff > 0) return 'red';
            if (diff < 0) return 'blue';
            return 'gray';
        }

        const SVG = {
            play:  `<svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M4 2.5l9 5.5-9 5.5z"/></svg>`,
            edit:  `<svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M10 3L13 6L6 13L2 14L3 10Z"/></svg>`,
            trash: `<svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M6.5 1.5h3l.5.5H13v1H3V2h3l.5-.5zM4 4.5h8l-.9 9.5H4.9L4 4.5zm2 1.5v6.5h1V6H6zm3 0v6.5h1V6H9z"/></svg>`,
            pause: `<svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="2.5" width="3.5" height="11" rx="1"/><rect x="9" y="2.5" width="3.5" height="11" rx="1"/></svg>`,
            check:  `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><polyline points="2,9 6,13 14,3"/></svg>`,
            wait:   `<svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M8 2a6 6 0 100 12A6 6 0 008 2zM7.5 5h1v3.5h-1zM8 8h3v1H8z"/></svg>`,
            unwait: `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" fill-rule="evenodd" d="M8 2a6 6 0 100 12A6 6 0 008 2zM7.5 5h1v3.5h-1zM8 8h3v1H8z"/><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M3 13L13 3"/></svg>`,
        };

        function renderTaskCard(task, today, showTime) {
            const div = document.createElement("div");
            let classes = "task";
            if (task.done) classes += " done";
            if (task.startTime > 0 && !task.done && !task.waiting) classes += " working";
            if (task.waiting && task.waitUntil > today) classes += " waiting-mode";
            div.className = classes;

            if (task.startTime > 0 && !task.done && !task.waiting && task.estimate > 0) {
                const progress = Math.min((Date.now() - task.startTime) / (task.estimate * 60000), 1) * 100;
                div.style.background = `linear-gradient(to bottom, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.38) ${progress.toFixed(1)}%, transparent ${progress.toFixed(1)}%), ${task.color}`;
            } else {
                div.style.background = task.color;
            }

            const isResurfacing = task.waiting && task.waitUntil && task.waitUntil <= today;
            let waitDateStr = '';
            if (task.waitUntil) {
                const parts = task.waitUntil.split('-');
                waitDateStr = `${parseInt(parts[1])}/${parseInt(parts[2])}`;
            }

            const actionButtons = (() => {
                if (task.done) {
                    return `
              <button onclick="editTask('${task.id}')" title="編集">${SVG.edit}</button>
              <button onclick="deleteTask('${task.id}')" title="削除">${SVG.trash}</button>`;
                } else if (task.waiting && !isResurfacing) {
                    return `
              <button onclick="unwaitTask('${task.id}')" title="待ちを解除">${SVG.unwait}</button>
              <button onclick="editTask('${task.id}')" title="編集">${SVG.edit}</button>
              <button onclick="deleteTask('${task.id}')" title="削除">${SVG.trash}</button>`;
                } else if (task.startTime > 0) {
                    return `
              <button onclick="interruptTask('${task.id}')" title="中断">${SVG.pause}</button>
              <button onclick="editTask('${task.id}')" title="編集">${SVG.edit}</button>
              <button onclick="waitTask('${task.id}')" title="待ちにする">${SVG.wait}</button>
              <button onclick="finishTask('${task.id}')" title="完了">${SVG.check}</button>`;
                } else {
                    return `
              <button onclick="startTask('${task.id}')" title="開始">${SVG.play}</button>
              <button onclick="editTask('${task.id}')" title="編集">${SVG.edit}</button>
              <button onclick="waitTask('${task.id}')" title="待ちにする">${SVG.wait}</button>
              <button onclick="deleteTask('${task.id}')" title="削除">${SVG.trash}</button>`;
                }
            })();

            const resurfaceBadge = isResurfacing ? `<span class="resurface-badge">⚠ 再浮上</span>` : '';
            const waitDateDisplay = task.waiting && waitDateStr
                ? `<span class="task-wait-date">催促: ${waitDateStr}</span>`
                : '';

            const clockSvg = `<svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor" style="vertical-align:-1px;opacity:0.7"><rect x="6.5" y="0" width="3" height="2" rx="0.5"/><path d="M11 1.5l1-.7.7 1-1 .7z"/><path fill-rule="evenodd" d="M8 3a5 5 0 100 10A5 5 0 008 3zm-.5 2h1v3.5h-1zm.5 3.5h2.5v1H8z"/></svg>`;
            let metaHtml;
            if (task.done) {
                metaHtml = `<span class="task-meta">${clockSvg} ${task.estimate}分 → ${task.actual}分 <span style="color:${getDiffColor(task)}">(${formatDiff(task)})</span></span>`;
            } else if (task.startTime > 0 && !task.waiting) {
                const elapsed = Math.max(1, Math.floor((Date.now() - task.startTime) / 60000));
                metaHtml = `<span class="task-meta">${clockSvg} ${task.estimate}分 → <span class="task-elapsed">${elapsed}分</span></span>`;
            } else {
                metaHtml = `<span class="task-meta">${clockSvg} ${task.estimate}分</span>`;
            }

            div.innerHTML = `
            <div>
             ${resurfaceBadge}<strong>${task.url
                    ? `<a class="title-link" href="${decodeURIComponent(task.url)}" target="_blank" rel="noopener noreferrer">${escapeHTML(task.title)}</a>`
                    : escapeHTML(task.title)
                }</strong><br>
              ${metaHtml}
              ${waitDateDisplay}
              <span class="drag-handle" title="並べ替え">&#9776;</span>
            </div>
            <div>
              <div class="memo">${task.memo ? escapeHTML(task.memo) : ""}</div>
            <div class="task-actions">${actionButtons}
            </div>
          `;
            div.dataset.id = task.id;
            if (task.memo) {
                const memoEl = div.querySelector('.memo');
                memoEl.addEventListener('click', () => memoEl.classList.toggle('expanded'));
            }
            return div;
        }

        function addSectionDivider(label) {
            const d = document.createElement('div');
            d.className = 'section-divider';
            d.textContent = label;
            tasksEl.appendChild(d);
        }

        function applySelectedHighlight(dateStr) {
            document.querySelectorAll('#calendar .fc-day-selected')
                .forEach(el => el.classList.remove('fc-day-selected'));
            if (dateStr) {
                document.querySelectorAll(`#calendar [data-date="${dateStr}"]`)
                    .forEach(el => el.classList.add('fc-day-selected'));
            }
        }

        function setSelectedDay(dateStr) {
            currentDate = dateStr;
            sortTasksByTime(currentDate);
            renderTasks();
            requestAnimationFrame(() => applySelectedHighlight(dateStr));
        }

        function animateFolderToggle(wrap, open) {
            wrap.style.transition = 'none';
            if (open) {
                wrap.style.height = '0';
                const target = wrap.scrollHeight;
                wrap.style.transition = 'height 0.25s ease';
                requestAnimationFrame(() => {
                    wrap.style.height = target + 'px';
                });
                setTimeout(() => { wrap.style.height = 'auto'; }, 260);
            } else {
                wrap.style.height = wrap.offsetHeight + 'px';
                wrap.style.transition = 'height 0.25s ease';
                requestAnimationFrame(() => {
                    wrap.style.height = '0';
                });
            }
        }

        function createCollapsibleFolder(label, tasks, isExpanded, onToggle, renderCardFn) {
            const folder = document.createElement('div');
            folder.className = 'done-folder';
            const header = document.createElement('div');
            header.className = 'done-folder-header' + (isExpanded ? ' open' : '');
            header.innerHTML = `<span class="folder-arrow">▶</span><span>${label} (${tasks.length})</span>`;
            const bodyWrap = document.createElement('div');
            bodyWrap.className = 'done-folder-body-wrap';
            const body = document.createElement('div');
            body.className = 'done-folder-body';
            tasks.forEach(task => body.appendChild(renderCardFn(task)));
            bodyWrap.appendChild(body);
            if (isExpanded) bodyWrap.style.height = 'auto';
            header.addEventListener('click', () => {
                const next = onToggle();
                header.classList.toggle('open', next);
                animateFolderToggle(bodyWrap, next);
            });
            folder.appendChild(header);
            folder.appendChild(bodyWrap);
            return folder;
        }

        function renderTasks() {
            const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            let { tasks: timedTasks } = buildTimeline(currentDate);

            // 待ちタスク：全日付から waitUntil が currentDate より未来のもの、かつ作成日以降
            const waitingTasks = allTasks
                .filter(t => !t.done && t.waiting && t.waitUntil && t.waitUntil > currentDate && t.date <= currentDate)
                .sort((a, b) => (a.waitUntil || '').localeCompare(b.waitUntil || ''));

            const normalTasks = timedTasks.filter(t => !t.done);
            const doneTasks   = timedTasks.filter(t => t.done);

            // 他の日付から再浮上した待ちタスク
            // waitUntil 当日 → 表示、waitUntil を過ぎて今日表示中 → 持ち越し表示
            // それ以外（waitUntil より後の日を閲覧中など）→ 表示しない
            const resurfacedFromPast = allTasks.filter(t => {
                if (t.done || !t.waiting || !t.waitUntil || t.date === currentDate) return false;
                if (t.waitUntil === currentDate) return true;           // waitUntil 当日
                if (t.waitUntil < today && currentDate === today) return true; // 持ち越し（今日のみ）
                return false;
            });

            tasksEl.innerHTML = "";

            // 完了フォルダー（リスト最上部、スクロール追従）
            if (doneTasks.length > 0) {
                tasksEl.appendChild(createCollapsibleFolder(
                    '完了', doneTasks, doneExpanded,
                    () => (doneExpanded = !doneExpanded),
                    task => renderTaskCard(task, today, true)
                ));
            }

            resurfacedFromPast.forEach(task => tasksEl.appendChild(renderTaskCard(task, today, false)));
            normalTasks.forEach(task => tasksEl.appendChild(renderTaskCard(task, today, true)));

            if (waitingTasks.length > 0) {
                tasksEl.appendChild(createCollapsibleFolder(
                    '待ち', waitingTasks, waitExpanded,
                    () => (waitExpanded = !waitExpanded),
                    task => renderTaskCard(task, today, false)
                ));
            }

            updateCalendar();
            updateEndTime();
        }

        function computePlannedTimes() {
            const tasks = getTasks(currentDate).sort((a, b) => a.order - b.order);
            const base = new Date(`${currentDate}T${startTime}`);
            let currentTime = new Date(base);

            return tasks.map(t => {
                let start, end;

                if (t.startTime > 0) {
                    start = new Date(t.startTime);
                    const duration = t.done ? t.actual : t.estimate;
                    end = new Date(start.getTime() + duration * 60000);
                    currentTime = end; // 積み上げ継続
                } else {
                    start = new Date(currentTime);
                    end = new Date(start.getTime() + t.estimate * 60000);
                    currentTime = end;
                }

                return { ...t, plannedStart: start, plannedEnd: end };
            });
        }

        function formatTime(d) {
            return d.toTimeString().slice(0, 5);
        }

        function waitTask(id) {
            waitingTargetId = id;
            const task = allTasks.find(t => t.id === id);
            const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            document.getElementById('waitModalTitle').value = task ? task.title : '';
            document.getElementById('waitModalDate').value = today;
            document.getElementById('waitModal').style.display = 'flex';
            setTimeout(() => {
                const ta = document.getElementById('waitModalTitle');
                ta?.focus();
                ta?.setSelectionRange(ta.value.length, ta.value.length);
            }, 50);
        }

        function unwaitTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            task.waiting = false;
            task.waitUntil = '';
            if (task.date < today) task.date = today;
            syncLocal();
            apiCall({ action: 'update', id, fields: { waiting: false, waitUntil: '', date: task.date } });
            renderTasks();
        }

        function deleteTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;

            const afterDelete = () => {
                allTasks = allTasks.filter(t => t.id !== id);
                taskHistoryCache = null;
                syncLocal();
                apiCall({ action: 'delete', id });
                renderTasks();
            };

            const card = document.querySelector(`.task[data-id="${id}"]`);
            if (!card) { afterDelete(); return; }

            card.style.height = card.offsetHeight + 'px';
            card.classList.add('task-completing');
            const overlay = document.createElement('div');
            overlay.className = 'task-complete-overlay';
            overlay.textContent = '✕';
            card.appendChild(overlay);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                card.style.height = '0';
                card.style.opacity = '0';
                card.style.marginBottom = '0';
                card.style.padding = '0';
            }));

            setTimeout(afterDelete, 500);
        }

        function startTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;

            const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            if (task.date !== today) {
                alert("本日のタスクしか開始できません。");
                return;
            }

            task.startTime = Date.now();
            syncLocal();
            apiCall({ action: 'update', id, fields: { startTime: task.startTime } });
            sortTasksByTime(task.date);
            renderTasks();
            requestAnimationFrame(() => refreshNowIndicator());
        }

        function refreshNowIndicator() {
            if (!calendar) return;
            // nowIndicator を作り直して位置を最新にする
            calendar.setOption('nowIndicator', false);
            calendar.setOption('nowIndicator', true);
        }


        async function interruptTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task || !task.startTime || task.done) {
                alert("開始していないか、すでに完了しています。");
                return;
            }

            // ボタンをスピナーに切り替え
            const card = document.querySelector(`.task[data-id="${id}"]`);
            let pauseBtn = null;
            if (card) {
                pauseBtn = card.querySelector('[onclick^="interruptTask"]');
                if (pauseBtn) {
                    pauseBtn.innerHTML = `<span class="btn-spinner"><svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 1a6 6 0 0 1 0 12"/></svg></span>`;
                    pauseBtn.disabled = true;
                }
            }

            const result = await apiCall({ action: 'interrupt', id, now_ms: Date.now() });
            if (!result) { alert("中断に失敗しました（通信エラー）"); return; }
            if (!result.ok) { alert("中断に失敗しました: " + (result.error || "不明なエラー")); return; }
            const otherDays = allTasks.filter(t => t.date !== task.date);
            allTasks = [...otherDays, ...result.tasks];
            taskHistoryCache = null;
            syncLocal();

            const afterRender = () => {
                renderTasks();
                requestAnimationFrame(() => refreshNowIndicator());
            };

            if (!card) { afterRender(); return; }

            card.style.height = card.offsetHeight + 'px';
            card.classList.add('task-completing');
            const overlay = document.createElement('div');
            overlay.className = 'task-complete-overlay';
            overlay.innerHTML = '<svg viewBox="0 0 16 16" width="28" height="28" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="2.5" width="3.5" height="11" rx="1"/><rect x="9" y="2.5" width="3.5" height="11" rx="1"/></svg>';
            card.appendChild(overlay);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                card.style.height = '0';
                card.style.opacity = '0';
                card.style.marginBottom = '0';
                card.style.padding = '0';
            }));

            setTimeout(afterRender, 500);
        }

        function finishTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task || !task.startTime) { alert("開始していません"); return; }
            const rawMinutes = (Date.now() - task.startTime) / 60000;
            task.actual = rawMinutes < 1 ? 1 : Math.floor(rawMinutes);
            task.done = true;
            syncLocal();
            apiCall({ action: 'update', id, fields: { done: true, actual: task.actual } });

            const afterRender = () => {
                renderTasks();
                requestAnimationFrame(() => refreshNowIndicator());
                if (autoStartNext) {
                    const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
                    const next = allTasks
                        .filter(t => t.date === today && !t.done && t.startTime === 0)
                        .sort((a, b) => a.order - b.order)[0];
                    if (next) startTask(next.id);
                }
            };

            const card = document.querySelector(`[data-id="${id}"]`);
            if (!card) { afterRender(); return; }

            card.style.height = card.offsetHeight + 'px';
            card.classList.add('task-completing');
            const overlay = document.createElement('div');
            overlay.className = 'task-complete-overlay';
            overlay.textContent = '✓';
            card.appendChild(overlay);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                card.style.height = '0';
                card.style.opacity = '0';
                card.style.marginBottom = '0';
                card.style.padding = '0';
            }));

            setTimeout(afterRender, 500);
        }

        function checkAutoScheduled() {
            const now = Date.now();
            const today = new Date(now + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            let changed = false;

            for (const task of allTasks) {
                if (!task.scheduledTime || task.done) continue;
                const scheduledMs = new Date(`${task.date}T${task.scheduledTime}:00`).getTime();
                const endMs = scheduledMs + task.estimate * 60000;

                if (task.startTime === 0 && now >= endMs) {
                    // 開始も終了も過ぎている → 一括でstart+done
                    task.startTime = scheduledMs;
                    task.actual = Math.max(1, task.estimate);
                    task.done = true;
                    syncLocal();
                    apiCall({ action: 'update', id: task.id, fields: { startTime: task.startTime, done: true, actual: task.actual } });
                    changed = true;
                } else if (task.startTime === 0 && now >= scheduledMs) {
                    // 開始時刻を過ぎた → 自動開始
                    task.startTime = scheduledMs;
                    syncLocal();
                    apiCall({ action: 'update', id: task.id, fields: { startTime: task.startTime } });
                    changed = true;
                } else if (task.startTime > 0 && now >= endMs) {
                    // 終了時刻を過ぎた → 自動終了
                    task.actual = Math.max(1, Math.round((endMs - task.startTime) / 60000));
                    task.done = true;
                    syncLocal();
                    apiCall({ action: 'update', id: task.id, fields: { done: true, actual: task.actual } });
                    changed = true;
                }
            }

            // 再浮上チェック（waitUntil 当日になったタスクが増減したら再描画）
            const todayForWait = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            const resurfacedCount = allTasks.filter(t => t.waiting && t.waitUntil && t.waitUntil <= todayForWait).length;
            if (resurfacedCount !== lastResurfacedCount) {
                lastResurfacedCount = resurfacedCount;
                changed = true;
            }

            if (changed) {
                renderTasks();
                requestAnimationFrame(() => refreshNowIndicator());
            }
        }

        function editTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            editingId = id;

            // モーダルに値をセット
            document.getElementById("modalDate").value = task.date;
            document.getElementById("modalTitle").value = task.title;
            document.getElementById("modalEstimate").value = task.estimate;
            document.getElementById("modalUrl").value = task.url ? decodeURIComponent(task.url) : "";
            document.getElementById("modalMemo").value = task.memo || "";

            // 完了タスクのみ開始・終了時刻を表示
            const timeRow = document.getElementById("modalTimeRow");
            if (task.done && task.startTime > 0) {
                timeRow.style.display = "flex";
                const startD = new Date(task.startTime);
                document.getElementById("modalStartTime").value = startD.toTimeString().slice(0, 5);
                const endD = new Date(task.startTime + (task.actual || task.estimate) * 60000);
                document.getElementById("modalEndTime").value = endD.toTimeString().slice(0, 5);
            } else {
                timeRow.style.display = "none";
            }

            // 日付入力: 進行中は変更不可
            document.getElementById("modalDate").disabled = (task.startTime > 0 && !task.done);

            // 開始時刻固定トグル (完了・進行中タスクには表示しない)
            const fixedRow = document.getElementById("modalFixedRow");
            const fixedToggle = document.getElementById("modalFixedToggle");
            const scheduledInput = document.getElementById("modalScheduledTime");
            if (task.done || task.startTime > 0) {
                fixedRow.style.display = "none";
            } else {
                fixedRow.style.display = "flex";
                const isFixed = !!(task.scheduledTime);
                fixedToggle.classList.toggle("active", isFixed);
                fixedToggle.textContent = isFixed ? "開始時刻: 固定" : "開始時刻: 固定しない";
                scheduledInput.style.display = isFixed ? "" : "none";
                scheduledInput.value = task.scheduledTime || "";
            }

            // カラーパレット
            const palette = document.getElementById("modalColorPalette");
            palette.innerHTML = colorList.map(c =>
                `<div class="color-swatch${c === task.color ? ' selected' : ''}" style="background:${c}" data-color="${c}"></div>`
            ).join('');
            palette.querySelectorAll(".color-swatch").forEach(s => {
                s.addEventListener("click", () => {
                    palette.querySelectorAll(".color-swatch").forEach(x => x.classList.remove("selected"));
                    s.classList.add("selected");
                });
            });

            document.getElementById("editModal").classList.add("open");
            setTimeout(() => document.getElementById("modalTitle")?.focus(), 50);
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById("editModal").classList.remove("open");
        }

        function normalizeUrl(u) {
            const s = (u || "").trim();
            if (!s) return "";
            // スキーマが無ければ https を付与
            if (!/^https?:\/\//i.test(s)) return "https://" + s;
            return s;
        }

        function saveEdit(id) {
            const isNew = (id === '__new__');
            const task = isNew ? { ...pendingNewTask } : allTasks.find(t => t.id === id);
            if (!task) { cancelEdit(); return; }

            task.title = document.getElementById("modalTitle").value.trim();
            task.memo  = document.getElementById("modalMemo").value.trim();
            const rawUrl = document.getElementById("modalUrl").value;
            const norm = normalizeUrl(rawUrl);
            task.url = norm ? encodeURIComponent(norm) : "";

            // 日付
            const newDate = document.getElementById("modalDate").value;
            if (/^\d{4}-\d{2}-\d{2}$/.test(newDate)) {
                if (isNew || newDate !== task.date) {
                    const dest = getTasks(newDate);
                    const maxOrder = dest.length ? Math.max(...dest.map(t => t.order)) : -1;
                    task.order = maxOrder + 1;
                    task.date = newDate;
                }
            }

            // 見積（全角対応）
            const rawEst = document.getElementById("modalEstimate").value.trim()
                .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            const est = parseInt(rawEst, 10);
            task.estimate = (isNaN(est) || est <= 0) ? 15 : est;

            // 色
            const sel = document.querySelector("#modalColorPalette .color-swatch.selected");
            if (sel) task.color = sel.dataset.color;

            // 完了タスクの開始・終了手編集
            if (task.done) {
                const stVal = document.getElementById("modalStartTime").value;
                const enVal = document.getElementById("modalEndTime").value;
                if (/^\d{2}:\d{2}$/.test(stVal) && /^\d{2}:\d{2}$/.test(enVal)) {
                    const base = task.date;
                    const startMs = new Date(`${base}T${stVal}`).getTime();
                    let endMs   = new Date(`${base}T${enVal}`).getTime();
                    if (endMs <= startMs) endMs += 24 * 60 * 60 * 1000;
                    task.startTime = startMs;
                    task.actual = Math.max(1, Math.round((endMs - startMs) / 60000));
                }
            }

            // 開始時刻固定（未開始・未完了タスクのみ）
            if (!task.done && task.startTime === 0) {
                const fixedToggle = document.getElementById("modalFixedToggle");
                const scheduledInput = document.getElementById("modalScheduledTime");
                if (fixedToggle.classList.contains("active") && /^\d{2}:\d{2}$/.test(scheduledInput.value)) {
                    task.scheduledTime = scheduledInput.value;
                } else {
                    task.scheduledTime = "";
                }
            }

            if (isNew) {
                allTasks.push(task);
                taskHistoryCache = null;
                syncLocal();
                apiCall({ action: 'add', task });
            } else {
                syncLocal();
                apiCall({ action: 'update', id, fields: {
                    title: task.title, memo: task.memo, url: task.url,
                    date: task.date, estimate: task.estimate, color: task.color,
                    startTime: task.startTime, actual: task.actual,
                    done: task.done, order: task.order,
                    scheduledTime: task.scheduledTime ?? "",
                }});
            }

            pendingNewTask = null;
            editingId = null;
            document.getElementById("editModal").classList.remove("open");
            sortTasksByTime(task.date);
            renderTasks();
        }

        function updateCalendar() {
            const view = calendar.view;
            const start = new Date(view.activeStart);
            const end = new Date(view.activeEnd);
            const events = [];

            for (let d = new Date(start); d < end; d.setDate(d.getDate() + 1)) {
                const ymd = d.toISOString().slice(0, 10);
                const { tasks } = buildTimeline(ymd);

                tasks.forEach(t => {
                    const segs = t.segments || [{ start: t.plannedStart, end: t.plannedEnd }];
                    segs.forEach(seg => {
                        events.push({
                            title: t.title,
                            start: seg.start,
                            end: seg.end,
                            backgroundColor: t.done ? getPaleColor(t.color) : t.color,
                            borderColor: t.done
                                ? getPaleColor(t.color)
                                : (t.startTime > 0 ? "red" : t.color),
                            extendedProps: { task: t }
                        });
                    });
                });
            }

            const scroller = document.querySelector('#fc .fc-scroller-liquid-absolute')
                          || document.querySelector('#fc .fc-scroller');
            const savedTop = scroller ? scroller.scrollTop : 0;
            calendar.batchRendering(() => {
                calendar.removeAllEvents();
                calendar.addEventSource(events);
            });
            if (scroller && savedTop) requestAnimationFrame(() => { scroller.scrollTop = savedTop; });
        }

        // 元の色に対応する淡い色マッピング
        function getPaleColor(hex) {
            const paleMap = {
                "#EF9A9A": "#FFCDD2",
                "#F48FB1": "#F8BBD0",
                "#CE93D8": "#E1BEE7",
                "#B39DDB": "#D1C4E9",
                "#9FA8DA": "#C5CAE9",
                "#90CAF9": "#BBDEFB",
                "#80DEEA": "#B2EBF2",
                "#80CBC4": "#B2DFDB",
                "#A5D6A7": "#C8E6C9",
                "#C5E1A5": "#DCEDC8",
                "#FFF176": "#FFF9C4",
                "#FFE082": "#FFECB3"
            };
            return paleMap[hex] || "#eeeeee";
        }


        function updateEndTime() {
            const { latestEnd } = buildTimeline(currentDate);
            const base = new Date(`${currentDate}T${startTime}`);
            endTimeDisplay.textContent = latestEnd > base ? latestEnd.toTimeString().slice(0, 5) : '--:--';
        }

        // 固定タスクを障害物として自由タスクをセグメント分割して配置
        function placeWithSegments(startDate, durationMin, obstacles) {
            let remaining = durationMin;
            let cursor = new Date(startDate);
            const segments = [];

            for (const obs of obstacles) {
                if (remaining <= 0) break;
                if (cursor >= obs.end) continue;
                if (cursor >= obs.start) {
                    cursor = new Date(obs.end);
                    continue;
                }
                const availableMin = (obs.start - cursor) / 60000;
                const consume = Math.min(remaining, availableMin);
                segments.push({ start: new Date(cursor), end: new Date(cursor.getTime() + consume * 60000) });
                remaining -= consume;
                cursor = remaining > 0 ? new Date(obs.end) : new Date(cursor.getTime() + consume * 60000);
            }

            if (remaining > 0) {
                segments.push({ start: new Date(cursor), end: new Date(cursor.getTime() + remaining * 60000) });
                cursor = new Date(cursor.getTime() + remaining * 60000);
            }

            // estimate=0 などで segments が空になった場合のガード
            if (segments.length === 0) {
                segments.push({ start: new Date(cursor), end: new Date(cursor) });
            }

            return { segments, finalEnd: cursor };
        }

        // 積み上げ計算
        function buildTimeline(date, { useNow = true } = {}) {
            const today = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            // 純粋な待ちタスク（再浮上前）はタイムラインから除外
            const tasks = getTasks(date).filter(t => !(t.waiting && t.waitUntil > today)).slice().sort((a, b) => a.order - b.order);
            const startBase = new Date(`${date}T${startTime}`);
            let latestEnd = startBase;
            const now = new Date();
            const result = [];

            // 固定時刻の障害物（未開始・未完了の scheduledTime タスク）を収集
            const obstacles = tasks
                .filter(t => !t.done && t.startTime === 0 && t.scheduledTime)
                .map(t => {
                    const s = new Date(`${date}T${t.scheduledTime}`);
                    return { start: s, end: new Date(s.getTime() + t.estimate * 60000) };
                })
                .sort((a, b) => a.start - b.start);

            // ① 完了済みタスク → 実時刻で配置、分断なし（重なり許容）
            tasks.filter(t => t.done).forEach(t => {
                const start = t.startTime > 0 ? new Date(t.startTime) : new Date(`${date}T${startTime}`);
                const end = new Date(start.getTime() + (t.actual > 0 ? t.actual : t.estimate) * 60000);
                const segments = [{ start, end }];
                result.push({ ...t, plannedStart: start, plannedEnd: end, segments });
                if (end > latestEnd) latestEnd = end;
            });

            // ② 開始済み・未完了タスク → 固定タスクで分断
            tasks.filter(t => !t.done && t.startTime > 0).forEach(t => {
                const { segments, finalEnd } = placeWithSegments(new Date(t.startTime), t.estimate, obstacles);
                result.push({ ...t, plannedStart: segments[0].start, plannedEnd: finalEnd, segments });
                if (finalEnd > latestEnd) latestEnd = finalEnd;
            });

            // ③ 固定時刻タスク（未開始・未完了）→ scheduledTime に配置、分断なし
            tasks.filter(t => !t.done && t.startTime === 0 && t.scheduledTime)
                .sort((a, b) => a.scheduledTime.localeCompare(b.scheduledTime))
                .forEach(t => {
                    const start = new Date(`${date}T${t.scheduledTime}`);
                    const end = new Date(start.getTime() + t.estimate * 60000);
                    const segments = [{ start, end }];
                    result.push({ ...t, plannedStart: start, plannedEnd: end, segments });
                });

            // now ジャンプ（current はフリータスクの配置起点なので固定タスクを含まない latestEnd ベース）
            let current = (useNow && date === today && now > latestEnd) ? now : latestEnd;

            // ④ 自由タスク（未開始・未完了・scheduledTime なし）→ 固定タスクで分断しながら積み上げ
            tasks.filter(t => !t.done && t.startTime === 0 && !t.scheduledTime)
                .sort((a, b) => a.order - b.order)
                .forEach(t => {
                    const { segments, finalEnd } = placeWithSegments(current, t.estimate, obstacles);
                    result.push({ ...t, plannedStart: segments[0].start, plannedEnd: finalEnd, segments });
                    current = finalEnd;
                });

            // タスクリストの表示順を手動 order に合わせる
            result.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

            // 終了予定 = 全タスクの plannedEnd の最大値
            const latestPlannedEnd = result.reduce((max, t) => t.plannedEnd > max ? t.plannedEnd : max, new Date(0));
            return { tasks: result, latestEnd: latestPlannedEnd > current ? latestPlannedEnd : current };
        }

        function sortTasksByTime(date) {
            const { tasks } = buildTimeline(date);
            tasks.slice()
                .sort((a, b) => (a.plannedStart?.getTime() ?? Infinity) - (b.plannedStart?.getTime() ?? Infinity))
                .forEach((t, i) => {
                    const task = allTasks.find(tt => tt.id === t.id);
                    if (task) task.order = i;
                });
            syncLocal();
            const ids = allTasks.filter(t => t.date === date)
                .sort((a, b) => a.order - b.order)
                .map(t => t.id);
            apiCall({ action: 'reorder', date, order: ids });
        }

        // --- スマート見積時間 ---
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({length: m + 1}, (_, i) => i);
            for (let j = 1; j <= n; j++) {
                let prev = j;
                for (let i = 1; i <= m; i++) {
                    const val = a[i-1] === b[j-1] ? dp[i-1] : 1 + Math.min(dp[i-1], dp[i], prev);
                    dp[i-1] = prev;
                    prev = val;
                }
                dp[m] = prev;
            }
            return dp[m];
        }

        function buildTaskHistory() {
            if (taskHistoryCache) return taskHistoryCache;
            const map = new Map();
            const recent = allTasks
                .filter(t => t.done && t.actual > 0)
                .sort((a, b) => b.date.localeCompare(a.date))
                .slice(0, 1000);
            recent.forEach(t => {
                const base = t.title.replace(/（中断）$/, '').trim();
                const key = `${t.date}|${base}`;
                const entry = map.get(key);
                if (entry) entry.total += t.actual;
                else map.set(key, { title: base, total: t.actual, date: t.date });
            });
            taskHistoryCache = Array.from(map.values());
            return taskHistoryCache;
        }

        function searchSimilarTasks(query) {
            if (!query) return [];
            const q = query.toLowerCase();
            return buildTaskHistory()
                .map(h => {
                    const maxLen = Math.max(q.length, h.title.length);
                    const score = maxLen === 0 ? 1 : 1 - levenshtein(q, h.title.toLowerCase()) / maxLen;
                    return { ...h, score };
                })
                .filter(h => h.score >= 0.5)
                .sort((a, b) => b.score - a.score || b.date.localeCompare(a.date))
                .slice(0, 3);
        }

                    label.textContent = '';
                    setTimeout(() => { container.style.transition = ''; }, 220);
                    if (reload) setTimeout(() => location.reload(), 180);
                }
            })();

            // Mobile swipe: 3-state panel (tasks only / both / calendar only)
            (function() {
                const tasklist = document.getElementById('tasklist');
                const cal = document.getElementById('calendar');
                const cont = document.getElementById('container');

                // state: 0=tasks only, 1=both (default), 2=calendar only
                const TASK_W = [100, 60, 0];
                const CAL_W  = [0,  40, 100];
                let state = 1;
                let startX = 0, startY = 0, dragX = 0;
                let active = false, locked = false, horiz = false;

                function isMobile() { return window.innerWidth <= 800; }

                function lerp(a, b, t) { return a + (b - a) * t; }

                function widthsAt(pos) {
                    const p = Math.max(0, Math.min(2, pos));
                    const i = Math.min(Math.floor(p), 1);
                    const t = p - i;
                    return [lerp(TASK_W[i], TASK_W[i + 1], t), lerp(CAL_W[i], CAL_W[i + 1], t)];
                }

                function applyWidths(tw, cw, animate) {
                    const total = cont.offsetWidth;
                    const taskPx = Math.round(total * tw / 100);
                    const calPx  = total - taskPx;
                    tasklist.style.transition = cal.style.transition =
                        animate ? 'width 0.32s cubic-bezier(0.4,0,0.2,1)' : 'none';
                    tasklist.style.width = taskPx + 'px';
                    cal.style.width = calPx + 'px';
                }

                function snapTo(s, animate) {
                    state = Math.max(0, Math.min(2, s));
                    applyWidths(TASK_W[state], CAL_W[state], animate);
                    if (animate) setTimeout(() => window.dispatchEvent(new Event('resize')), 350);
                }

                document.addEventListener('touchstart', e => {
                    if (!isMobile()) return;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    active = true; locked = false; horiz = false; dragX = 0;
                }, { passive: true });

                document.addEventListener('touchmove', e => {
                    if (!active || !isMobile()) return;
                    const dx = e.touches[0].clientX - startX;
                    const dy = e.touches[0].clientY - startY;
                    if (!locked) {
                        if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
                        horiz = Math.abs(dx) > Math.abs(dy) * 1.2;
                        locked = true;
                    }
                    if (!horiz) return;
                    e.preventDefault();
                    dragX = dx;
                    // left swipe (dx < 0) → higher state; right swipe → lower state
                    const [tw, cw] = widthsAt(state - dragX / cont.offsetWidth);
                    applyWidths(tw, cw, false);
                }, { passive: false });

                document.addEventListener('touchend', () => {
                    if (!active || !isMobile()) { active = false; return; }
                    active = false;
                    if (!horiz) return;
                    const frac = dragX / cont.offsetWidth;
                    if (frac < -0.25 && state < 2) snapTo(state + 1, true);
                    else if (frac > 0.25 && state > 0) snapTo(state - 1, true);
                    else snapTo(state, true);
                }, { passive: true });

                document.addEventListener('touchcancel', () => {
                    if (active && isMobile()) { active = false; if (horiz) snapTo(state, true); }
                }, { passive: true });

                window.addEventListener('resize', () => {
                    if (isMobile()) {
                        applyWidths(TASK_W[state], CAL_W[state], false);
                    } else {
                        tasklist.style.width = tasklist.style.transition = '';
                        cal.style.width = cal.style.transition = '';
                    }
                });

                if (isMobile()) applyWidths(TASK_W[state], CAL_W[state], false);
            })();

        });

        function escapeHTML(str) {
            return (str ?? "").replace(/[&<>"']/g, s => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            }[s]));
        }
    </script>
    <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
</body>
