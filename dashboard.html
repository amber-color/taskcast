<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ダッシュボード - TaskTracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskTracker">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script src="vendor/chart.umd.js"></script>
    <script src="vendor/jquery.min.js"></script>
    <link rel="stylesheet" href="vendor/jquery.dataTables.min.css">
    <script src="vendor/jquery.dataTables.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }
        html, body {
            margin: 0;
            height: 100%;
        }
        body {
            background: #f5f5f7;
            color: #333;
            overscroll-behavior: none;
        }

        #header {
            display: flex;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 8px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        #header > div { flex: 1; }

        #header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0;
            white-space: nowrap;
        }

        #backBtn {
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 14px;
            color: #444;
            cursor: pointer;
            transition: background 0.13s;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        #backBtn:hover { background: rgba(0,0,0,0.06); }

        #content {
            padding: 20px;
            max-width: 860px;
            margin: 0 auto;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-row label {
            font-size: 13px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-row input[type="date"] {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 13px;
            font-family: inherit;
            background: white;
            color: #333;
            outline: none;
            transition: border-color 0.13s;
        }
        .filter-row input[type="date"]:focus { border-color: #888; }
        .filter-row button {
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.13s;
        }
        .filter-row button:hover { background: #555; }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 0 0 12px;
        }

        canvas {
            max-width: 100%;
            display: block;
        }

        table.dataTable {
            width: 100% !important;
            border-collapse: collapse;
            font-size: 13px;
        }
        table.dataTable th,
        table.dataTable td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        table.dataTable thead th {
            color: #aaa;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: none;
            border-bottom: 1px solid #eee;
        }
        table.dataTable tbody tr:last-child td { border-bottom: none; }
        table.dataTable tbody tr:hover td { background: #f9f9f9; }

        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate,
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter { display: none; }
    </style>
</head>
<body>
    <div id="header">
        <div>
            <button id="backBtn" onclick="history.back()">
                <svg viewBox="0 0 8 14" width="8" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7,1 1,7 7,13"/></svg>
                戻る
            </button>
        </div>
        <h1>ダッシュボード</h1>
        <div></div>
    </div>

    <div id="content">
        <div class="filter-row">
            <label>開始 <input type="date" id="startDate"></label>
            <label>終了 <input type="date" id="endDate"></label>
            <button onclick="loadData()">更新</button>
        </div>

        <div class="card">
            <p class="section-title">日別 見積 vs 実績（分）</p>
            <canvas id="barChart"></canvas>
        </div>

        <div class="card">
            <p class="section-title">日別 乖離の絶対値（分）</p>
            <canvas id="lineChart"></canvas>
        </div>

        <div class="card">
            <p class="section-title">タスク一覧</p>
            <table id="taskTable" class="display">
                <thead>
                    <tr>
                        <th>開始日時</th>
                        <th>タイトル</th>
                        <th>見積</th>
                        <th>実績</th>
                        <th>乖離</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let barChart = null, lineChart = null, dataTable = null;

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const authRes = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'check' })
                });
                const authData = await authRes.json();
                if (!authData.ok) { location.href = 'login.html'; return; }
            } catch (e) {
                location.href = 'login.html'; return;
            }

            const today = new Date();
            const oneMonthAgo = new Date(today);
            oneMonthAgo.setMonth(today.getMonth() - 1);
            document.getElementById("startDate").value = oneMonthAgo.toISOString().slice(0, 10);
            document.getElementById("endDate").value = today.toISOString().slice(0, 10);

            loadData();
        });

        function escapeHTML(s) {
            return String(s).replace(/[&<>"']/g, c =>
                ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        }

        function loadData() {
            fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'load' })
            })
                .then(res => {
                    if (res.status === 401) { location.href = 'login.html'; return null; }
                    return res.json();
                })
                .then(tasks => tasks && renderDashboard(tasks))
                .catch(err => alert("読み込み失敗: " + err));
        }

        function renderDashboard(tasks) {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;

            const doneTasks = tasks.filter(t => t.done && t.date >= start && t.date <= end);
            const tableRows = [];
            const barMap = {};
            const lineMap = {};

            doneTasks.forEach(t => {
                const diff = t.actual - t.estimate;

                if (!barMap[t.date]) barMap[t.date] = { est: 0, act: 0 };
                barMap[t.date].est += t.estimate;
                barMap[t.date].act += t.actual;

                if (!lineMap[t.date]) lineMap[t.date] = 0;
                lineMap[t.date] += Math.abs(diff);

                const color = diff < 0 ? '#4a90d9' : diff > 0 ? '#e05c5c' : '#888';
                const startDate = t.startTime ? new Date(t.startTime).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : "";
                tableRows.push([
                    startDate,
                    escapeHTML(t.title),
                    t.estimate,
                    t.actual,
                    `<span style="color:${color};font-weight:600;">${diff > 0 ? '+' : ''}${diff}</span>`
                ]);
            });

            if (dataTable) {
                dataTable.clear();
                dataTable.rows.add(tableRows).draw();
            } else {
                dataTable = $('#taskTable').DataTable({
                    data: tableRows,
                    columns: [
                        { title: "開始日時" },
                        { title: "タイトル" },
                        { title: "見積" },
                        { title: "実績" },
                        { title: "乖離" }
                    ],
                    paging: false,
                    searching: false,
                    order: [[0, 'desc']]
                });
            }

            const dates = Object.keys(barMap).sort();
            const estPerDay = dates.map(d => barMap[d].est);
            const actPerDay = dates.map(d => barMap[d].act);
            barChart = drawChart(barChart, "barChart", "bar", dates,
                [estPerDay, actPerDay], ["#90caf9", "#ef9a9a"], ["見積", "実績"]);

            const lineValues = dates.map(d => lineMap[d] || 0);
            lineChart = drawChart(lineChart, "lineChart", "line", dates,
                [lineValues], ["#80cbc4"], ["乖離"]);
        }

        function drawChart(ref, id, type, labels, datasets, colors, datasetLabels) {
            if (ref && typeof ref.destroy === 'function') ref.destroy();
            const ctx = document.getElementById(id).getContext("2d");
            return new Chart(ctx, {
                type,
                data: {
                    labels,
                    datasets: datasets.map((data, i) => ({
                        label: datasetLabels[i] || "",
                        data,
                        backgroundColor: type === "line" ? "rgba(128,203,196,0.12)" : colors[i],
                        borderColor: colors[i],
                        borderWidth: type === "line" ? 2 : undefined,
                        fill: type === "line",
                        tension: 0.3,
                        pointRadius: type === "line" ? 3 : undefined,
                        borderRadius: type === "bar" ? 4 : undefined,
                    }))
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: {
                                font: { family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif', size: 12 },
                                color: '#666'
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#f0f0f0' }, ticks: { color: '#aaa', font: { size: 11 } } },
                        y: { grid: { color: '#f0f0f0' }, ticks: { color: '#aaa', font: { size: 11 } } }
                    }
                }
            });
        }
    </script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
